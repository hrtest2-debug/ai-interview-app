<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Assessment</title>

<style>
:root {
  --primary: #2563eb;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --border: #e2e8f0;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 520px;
  background: var(--card);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin: 0 0 20px 0;
  font-size: 20px;
  color: var(--text);
}

.question-box {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: 500;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  resize: none;
  outline: none;
}

textarea:focus {
  border-color: var(--primary);
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

.btn-secondary {
  background: #e2e8f0;
}

.btn-secondary:hover {
  background: #cbd5e1;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  padding: 12px;
  border-radius: 8px;
  background: #f8fafc;
  font-size: 14px;
}

.score {
  font-size: 18px;
  font-weight: bold;
  color: var(--primary);
}
</style>
</head>

<body>

<div class="card">
  <h1>AI Interview Assessment</h1>

  <div class="question-box" id="question"></div>

  <textarea id="answer" placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea>

  <div class="actions">
    <button class="btn-secondary" id="newBtn">สุ่มคำถาม</button>
    <button class="btn-primary" id="submitBtn">ประเมินคำตอบ</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const questions = [
    "เล่าเกี่ยวกับตัวคุณ",
    "ทำไมคุณถึงอยากทำงานที่นี่",
    "จุดแข็งของคุณคืออะไร",
    "คุณจัดการกับความกดดันอย่างไร",
    "อีก 5 ปีคุณอยากเติบโตไปในทิศทางไหน"
  ];

  const questionEl = document.getElementById("question");
  const answerEl = document.getElementById("answer");
  const resultEl = document.getElementById("result");

  function newQuestion() {
    const randomIndex = Math.floor(Math.random() * questions.length);
    questionEl.textContent = questions[randomIndex];
    answerEl.value = "";
    resultEl.innerHTML = "";
  }

  function evaluate() {
    const answer = answerEl.value.trim();

    if (answer.length < 20) {
      resultEl.innerHTML = "คำตอบสั้นเกินไป กรุณาอธิบายเพิ่มเติม";
      return;
    }

    let score = 5;

    if (answer.length > 60) score += 2;
    if (answer.length > 120) score += 2;
    if (answer.includes("พัฒนา") || answer.includes("เรียนรู้")) score += 1;

    if (score > 10) score = 10;

    resultEl.innerHTML =
      "<div class='score'>คะแนน: " + score + " / 10</div>" +
      "<div>คำแนะนำ: เพิ่มตัวอย่างประสบการณ์จริงจะทำให้คำตอบแข็งแรงขึ้น</div>";
  }

  document.getElementById("newBtn").addEventListener("click", newQuestion);
  document.getElementById("submitBtn").addEventListener("click", evaluate);

  newQuestion();
});
</script>

</body>
</html>
