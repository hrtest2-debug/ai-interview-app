<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Cute 🌷</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #fceff9, #e0f7fa);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  width: 420px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h1 {
  color: #ff7eb3;
  margin-bottom: 10px;
}

#question {
  background: #fff4fb;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  font-weight: bold;
  color: #444;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 15px;
  border: 2px solid #ffd6ec;
  padding: 10px;
  font-size: 14px;
  resize: none;
  outline: none;
  background: #fdfaff;
}

textarea:focus {
  border-color: #ff9ac9;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.btn-random {
  background: #b5ead7;
}

.btn-random:hover {
  background: #9de0c5;
}

.btn-submit {
  background: #ffdac1;
}

.btn-submit:hover {
  background: #ffc4a3;
}

#result {
  margin-top: 15px;
  font-weight: bold;
  color: #555;
}

.score-box {
  font-size: 18px;
  color: #ff6f91;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌷 AI Interview 🌷</h1>

  <div id="question"></div>

  <textarea id="answer" placeholder="พิมพ์คำตอบของคุณที่นี่... ✨"></textarea>

  <br>
  <button class="btn-random" onclick="newQuestion()">🎀 สุ่มคำถาม</button>
  <button class="btn-submit" onclick="evaluate()">💌 ส่งคำตอบ</button>

  <div id="result"></div>
</div>

<script>

const questions = [
  "เล่าเกี่ยวกับตัวคุณ",
  "ทำไมคุณถึงอยากทำงานที่นี่",
  "จุดแข็งของคุณคืออะไร",
  "คุณเคยเจอปัญหาใหญ่และแก้ยังไง",
  "อีก 5 ปีคุณอยากเห็นตัวเองเป็นแบบไหน"
];

function newQuestion() {
  const randomIndex = Math.floor(Math.random() * questions.length);
  document.getElementById("question").innerText = questions[randomIndex];
  document.getElementById("answer").value = "";
  document.getElementById("result").innerHTML = "";
}

function evaluate() {
  const answer = document.getElementById("answer").value.trim();

  if (answer.length < 20) {
    document.getElementById("result").innerHTML =
      "⚠️ คำตอบสั้นไปหน่อย ลองอธิบายเพิ่มอีกนิดนะคะ 💕";
    return;
  }

  let score = 5;

  if (answer.length > 50) score += 2;
  if (answer.length > 120) score += 2;
  if (answer.includes("ความตั้งใจ") || answer.includes("พัฒนา")) score += 1;

  if (score > 10) score = 10;

  document.getElementById("result").innerHTML =
    "<div class='score-box'>🌟 คะแนน: " + score + " /10</div>" +
    "✨ ทำได้ดีมาก ลองเพิ่มตัวอย่างจริงจะยิ่งน่าประทับใจ 💖";
}

newQuestion();

</script>

</body>
</html>
