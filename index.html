<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Assessment</title>

<style>
:root {
  --primary: #2563eb;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --border: #e2e8f0;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 520px;
  background: var(--card);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin: 0 0 20px 0;
  font-size: 20px;
  color: var(--text);
}

.question-box {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: 500;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  resize: none;
  outline: none;
}

textarea:focus {
  border-color: var(--primary);
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

.btn-secondary {
  background: #e2e8f0;
}

.btn-secondary:hover {
  background: #cbd5e1;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  padding: 12px;
  border-radius: 8px;
  background: #f8fafc;
  font-size: 14px;
}

.score {
  font-size: 18px;
  font-weight: bold;
  color: var(--primary);
}
</style>
</head>

<body>

<div class="card">
  <h1>AI Interview Assessment</h1>

  <div class="question-box" id="question"></div>

  <textarea id="answer" placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea>

  <div class="actions">
    <button class="btn-secondary" id="newBtn">สุ่มคำถาม</button>
    <button class="btn-primary" id="submitBtn">ประเมินคำตอบ</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const questions = {

beginner: [
"เล่าเกี่ยวกับตัวคุณ",
"จุดแข็งของคุณคืออะไร",
"ทำไมถึงอยากทำงานที่นี่"
],

intermediate: [
"เล่าประสบการณ์ที่คุณต้องแก้ปัญหายาก",
"คุณจัดการกับความกดดันอย่างไร",
"เคยมีความขัดแย้งกับทีมไหม และแก้ยังไง"
],

advanced: [
"เล่าการตัดสินใจยากที่สุดในชีวิตการทำงานของคุณ",
"ถ้าทีมของคุณทำโปรเจกต์ล้มเหลว คุณจะจัดการอย่างไร",
"คุณจะสร้างผลกระทบเชิงกลยุทธ์ให้บริษัทได้อย่างไร",
"เล่าเหตุการณ์ที่คุณต้องโน้มน้าวคนที่ไม่เห็นด้วยกับคุณ",
"ถ้าคุณต้องนำทีมที่ไม่มีแรงจูงใจ คุณจะทำอย่างไร"
]

};

let currentLevel = "advanced";

const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const resultEl = document.getElementById("result");
const levelEl = document.getElementById("level");

function newQuestion() {

const list = questions[currentLevel];

const randomIndex = Math.floor(Math.random() * list.length);

questionEl.textContent = list[randomIndex];

answerEl.value = "";
resultEl.innerHTML = "";

}

function evaluate() {

const answer = answerEl.value.trim();

if (answer.length < 30) {
resultEl.innerHTML = "คำตอบสั้นเกินไปสำหรับระดับนี้";
return;
}

let score = 5;

if (answer.length > 80) score += 2;
if (answer.length > 150) score += 2;

if (
answer.includes("กลยุทธ์") ||
answer.includes("วิเคราะห์") ||
answer.includes("ผลกระทบ")
) {
score += 1;
}

if (score > 10) score = 10;

resultEl.innerHTML =
"<div class='score'>คะแนน: " + score + " / 10</div>" +
"<div>Advanced feedback: ลองเพิ่มตัวอย่างสถานการณ์จริง</div>";

}

function changeLevel() {

currentLevel = levelEl.value;

newQuestion();

}

document.getElementById("newBtn").addEventListener("click", newQuestion);
document.getElementById("submitBtn").addEventListener("click", evaluate);

levelEl.addEventListener("change", changeLevel);

newQuestion();

});
</script>

</body>
</html>
<select id="level">
<option value="beginner">Beginner</option>
<option value="intermediate">Intermediate</option>
<option value="advanced" selected>Advanced</option>
</select>
