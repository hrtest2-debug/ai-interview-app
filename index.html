<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Simulation</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 50px auto;
    }
    textarea {
      width: 100%;
      height: 120px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f3f3f3;
    }
  </style>
</head>
<body>

<h1>Simulation สัมภาษณ์งาน</h1>

<p><b>คำถาม:</b> แนะนำตัวเองสั้น ๆ ภายใน 1 นาที</p>

<textarea id="answer"></textarea>
<br>
<button onclick="evaluate()">ส่งคำตอบ</button>

<div class="result" id="result"></div>

<script>
function evaluate() {
  const answer = document.getElementById("answer").value;

  if (answer.length < 20) {
    document.getElementById("result").innerHTML =
      "⚠️ คำตอบสั้นเกินไป ลองอธิบายเพิ่มอีกหน่อย";
    return;
  }

  document.getElementById("result").innerHTML =
    "✅ ดีมาก! โครงสร้างคำตอบชัดเจน แต่ควรเพิ่มตัวอย่างผลงานจริงเพื่อให้ดูน่าเชื่อถือขึ้น";
}
</script>

</body>
</html>
