<!DOCTYPE html>
<html>

<head>

<title>AI Interview</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:120px;
margin-top:20px;
padding:10px;
}

button{
margin-top:20px;
padding:15px 30px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:18px;
}

.result{
margin-top:30px;
background:#020617;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Interview Question</h2>

<p>Tell me about yourself</p>

<textarea id="answer" placeholder="Type your answer here..."></textarea>

<br>

<button onclick="submitAnswer()">Get AI Feedback</button>

<div class="result" id="result"></div>

</div>

<script>

async function submitAnswer(){

let answer = document.getElementById("answer").value

let res = await fetch("/api",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
answer:answer
})
})

let data = await res.json()

document.getElementById("result").innerText = data.feedback

}

</script>

</body>

</html>
