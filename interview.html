<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Interview</title>

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:40px;
border-radius:15px;
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:120px;
margin-top:20px;
border-radius:8px;
border:none;
padding:10px;
}

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

.score{
margin-top:20px;
font-size:22px;
color:#60a5fa;
}

</style>

</head>

<body>

<div class="card">

<h2 id="question">
Tell me about yourself
</h2>

<textarea id="answer"></textarea>

<br>

<button onclick="sendAnswer()">
Submit Answer
</button>

<div id="result" class="score"></div>

</div>

<script>

async function sendAnswer(){

const answer=document.getElementById("answer").value;

const res=await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({answer})
});

const data=await res.json();

document.getElementById("result").innerHTML=

"Score: "+data.score+"/10 <br><br>"+data.feedback;

}

</script>

</body>
</html>
