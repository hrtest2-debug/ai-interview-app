<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI Interview</title>

<style>
body{
font-family: Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:600px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h2>Simulation สัมภาษณ์งาน</h2>

<p id="question">
ทำไมเราควรรับคุณเข้าทำงาน
</p>

<textarea id="answer"></textarea>

<br>

<button onclick="send()">ส่งคำตอบ</button>

<div class="result" id="result"></div>

</div>

<script>

async function send(){

let answer=document.getElementById("answer").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({answer})
})

let data=await res.json()

document.getElementById("result").innerHTML=

"คะแนน: "+data.score+"/10 <br><br>"+data.feedback

}

</script>

</body>
</html>
